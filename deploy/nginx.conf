# Signify Nginx 配置（传统服务器）
# 适用于：Nginx 1.28+ / MySQL 5.7+ / PHP 8.0+

server {
    listen 80;
    server_name 你的域名或IP;
    root /www/wwwroot/signify/public;
    index index.php;

    charset utf-8;

    # 上传文件大小限制（头像最大 2MB，留余量）
    client_max_body_size 10M;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # X-XSS-Protection 已废弃，现代浏览器使用 Content-Security-Policy 替代
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

    # 请求日志
    access_log /www/wwwroot/signify/storage/logs/access.log;
    error_log /www/wwwroot/signify/storage/logs/error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # PHP-FPM（传统服务器常见配置）
    # 注意：部分面板使用 /tmp/php-cgi.sock 或 127.0.0.1:9000，请根据实际修改
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi.sock;
        # 或使用 TCP 连接（注释上面一行，取消下面两行）:
        # fastcgi_pass 127.0.0.1:9000;
        # fastcgi_keep_conn on;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问敏感文件和隐藏文件
    location ~ /\. {
        deny all;
    }

    # 限制上传目录访问
    location /storage/avatars {
        internal; # 仅内部访问，禁止外部直接访问
    }

    # Gzip 压缩（低配服务器建议开启）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
