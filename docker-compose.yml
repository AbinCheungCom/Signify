version: '3.8'

services:
  app:
    image: php:8.2-fpm
    container_name: signify-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    depends_on:
      - db
    networks:
      - signify

  nginx:
    image: nginx:alpine
    container_name: signify-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage:/var/www/storage
    depends_on:
      - app
    networks:
      - signify

  db:
    image: mysql:8.0
    container_name: signify-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: signify
      MYSQL_USER: signify
      MYSQL_PASSWORD: signify_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - signify

  node:
    image: node:18-alpine
    container_name: signify-node
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - signify

volumes:
  db_data:

networks:
  signify:
    driver: bridge
